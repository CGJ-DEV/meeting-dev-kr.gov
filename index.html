<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 면접 트레이너 PRO</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #eff6ff;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --accent: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px; /* 모바일 전용 세로형 폭 고정 */
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 80vh;
        }

        .hidden { display: none !important; }

        /* 헤더 스타일 */
        .app-header {
            padding: 20px 20px 10px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .app-header h1 {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .app-header p {
            font-size: 12px;
            color: var(--muted);
        }

        /* 세팅 화면 */
        .setup-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text);
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--muted);
        }

        select, input[type="number"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: var(--card);
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:focus, textarea:focus {
            border-color: var(--primary);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            min-height: 52px;
            text-decoration: none;
        }

        .btn:active { background: var(--primary-dark); }
        .btn-secondary { background: #e2e8f0; color: var(--text); }
        .btn-secondary:active { background: #cbd5e1; }
        .btn-accent { background: var(--success); }
        .btn-accent:active { background: #059669; }

        .question-item {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }

        .question-list-container {
            max-height: 180px;
            overflow-y: auto;
            margin-bottom: 8px;
        }

        /* 인터뷰 진행 화면 */
        .interview-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .video-wrapper {
            background: #000;
            position: relative;
            width: 100%;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #webcam-view {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: rotateY(180deg);
        }

        .camera-placeholder {
            position: absolute;
            color: #94a3b8;
            font-size: 13px;
            z-index: 2;
        }

        .recording-indicator {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(15, 23, 42, 0.6);
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 11px;
            color: white;
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 10;
        }

        .recording-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        .interview-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }

        .timer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .timer-val {
            font-size: 24px;
            font-weight: 800;
        }
        .timer-val.warning { color: var(--accent); }

        .badge {
            background: var(--primary-light);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
        }
        .badge-tail { background: #fff7ed; color: #ea580c; }

        .question-display-box {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.5;
            min-height: 70px;
            margin-bottom: 16px;
            color: var(--text);
        }

        .keyword-zone {
            margin-top: 10px;
            background: var(--bg);
            padding: 12px;
            border-radius: 10px;
        }
        .keyword-title { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
        .keyword-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .keyword-tag {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 4px 8px;
            border-radius: 14px;
            font-size: 11px;
            cursor: pointer;
        }
        .keyword-tag.checked { background: var(--success); color: white; border-color: var(--success); }

        /* 결과 분석 피드백 화면 */
        .feedback-container {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .video-box {
            background: #0f172a;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
        }

        #final-video {
            width: 100%;
            border-radius: 10px;
            background: #1e293b;
            aspect-ratio: 4 / 3;
            object-fit: contain;
        }

        .feedback-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
        }

        .rating-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 12px 0;
        }

        .rating-field {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .stars { display: flex; gap: 4px; }
        .star { cursor: pointer; font-size: 16px; color: #cbd5e1; }
        .star.active { color: #f59e0b; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- 1. 세팅 화면 -->
    <div id="setup-screen" class="setup-container">
        <div class="app-header">
            <h1>스마트 면접 트레이너</h1>
            <p>실제 자막이 입혀지는 전용 인터뷰 녹화</p>
        </div>

        <div class="card">
            <div class="section-title">⚙️ 세션 설정</div>
            <div class="form-group">
                <label>답변 제한시간</label>
                <select id="time-limit">
                    <option value="30">30초</option>
                    <option value="60" selected>60초 (권장)</option>
                    <option value="90">90초</option>
                    <option value="120">120초</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>질문 낭독 목소리</label>
                <select id="voice-select">
                    <option value="none">불러오는 중...</option>
                </select>
            </div>

            <div class="form-group">
                <label>압박 꼬리 질문 출제</label>
                <select id="tail-ratio">
                    <option value="0.5">50% 확률로 등장</option>
                    <option value="1">무조건 출제</option>
                    <option value="0">출제 안 함</option>
                </select>
            </div>
        </div>

        <div class="card">
            <div class="section-title">📂 질문 리스트 구성</div>
            <select id="template-select" onchange="applyTemplate()" style="margin-bottom: 12px;">
                <option value="custom">직접 질문 작성</option>
                <option value="hr" selected>공통 인성 면접</option>
                <option value="tech">IT 직무 면접</option>
                <option value="marketing">마케팅 직무 면접</option>
            </select>
            <div class="question-list-container" id="question-list"></div>
            <button class="btn btn-secondary" style="min-height:40px; font-size:13px;" onclick="addQuestionField()">+ 질문 추가</button>
        </div>

        <button class="btn" style="margin-top: 8px;" onclick="startInterview()">연습 시작하기 →</button>
    </div>

    <!-- 2. 인터뷰 진행 화면 -->
    <div id="interview-screen" class="interview-container hidden">
        <div class="video-wrapper">
            <div class="recording-indicator">
                <span class="recording-dot"></span>
                <span>자막 포함 녹화 중</span>
            </div>
            <span class="camera-placeholder" id="cam-placeholder">카메라가 비활성화되었습니다.</span>
            <video id="webcam-view" autoplay muted playsinline webkit-playsinline></video>
        </div>

        <div class="interview-content">
            <div>
                <div class="timer-row">
                    <span class="badge" id="step-badge">질문 1</span>
                    <div class="timer-val" id="timer-display">00:00</div>
                </div>
                <div class="question-display-box" id="question-display">대기 중...</div>
                
                <div class="keyword-zone" id="keyword-zone">
                    <div class="keyword-title">핵심 단어 체크</div>
                    <div class="keyword-tags" id="keyword-tags-target"></div>
                </div>
            </div>

            <div style="display: flex; gap:10px; margin-top: 20px;">
                <button class="btn btn-secondary" style="flex: 1;" onclick="stopInterview()">중단</button>
                <button class="btn" style="flex: 1.8;" id="next-btn" onclick="handleNext()">다음 질문 →</button>
            </div>
        </div>
    </div>

    <!-- 3. 결과 분석 피드백 화면 -->
    <div id="feedback-screen" class="feedback-container hidden">
        <h2 style="font-size: 16px; font-weight: 800; text-align: center;">모의면접 리포트</h2>
        
        <div class="video-box" id="final-video-box">
            <p style="color: #94a3b8; font-size: 11px; margin-bottom: 8px;">합성된 자막과 사운드가 포함된 전체 녹화 파일입니다.</p>
            <video id="final-video" controls playsinline></video>
            <div style="margin-top: 10px;">
                <a id="download-link" class="btn btn-accent" href="#">📥 면접 녹화 파일 내려받기</a>
            </div>
        </div>

        <div id="feedback-list"></div>

        <button class="btn" style="margin-top:10px;" onclick="location.reload()">처음 화면으로</button>
    </div>

</div>

<!-- 실시간 자막 합성을 위한 백그라운드 캔버스 추가 -->
<canvas id="recorder-canvas" width="640" height="480" class="hidden"></canvas>

<script>
    const templates = {
        hr: [
            { q: "간단한 자기소개와 지원 동기를 말씀해 주세요.", k: "자기소개,동기,강점" },
            { q: "상사나 동료와 갈등이 생겼을 때 어떻게 해결하겠습니까?", q_tail: "과거에 갈등을 합리적으로 해결했던 실제 경험이 있습니까?", k: "경청,조율" }
        ],
        tech: [
            { q: "본인이 경험한 주력 기술 스택과 그것을 선정한 이유를 말해 주세요.", k: "기술명,이유,장점" },
            { q: "프로젝트 중 기술적 난관과 이를 해결했던 과정을 설명해 주세요.", q_tail: "그 해결 방법의 아쉬운 점이나 대안책은 없었습니까?", k: "문제,해결책" }
        ],
        marketing: [
            { q: "본인이 기획한 프로젝트 중 가장 성공적이었던 일은 무엇인가요?", k: "목표,성과,기여도" },
            { q: "제한된 리소스로 효율을 극대화해야 한다면 어떤 전략을 취하겠습니까?", k: "우선순위,데이터" }
        ]
    };

    const generalFollowUps = [
        "그 당시의 선택이 최선이라고 판단한 이유는 무엇이었나요?",
        "이후 동일한 상황을 맞닥뜨린다면 어떻게 다르게 행동하겠습니까?"
    ];

    let interviewSession = [];
    let currentIdx = 0;
    let timer = null;
    let timeLeft = 0;
    let mediaStream = null;
    
    // 비디오/오디오 전체 녹화 변수
    let masterRecorder = null;
    let masterChunks = [];
    let isFollowUpStep = false;
    let systemVoices = [];
    let timelineMarks = [];
    let sessionStartTime = 0;

    // 자막 합성을 위한 비디오 캔버스 변수
    let canvasEl = null;
    let canvasCtx = null;
    let renderLoop = null;
    let currentQuestionText = "";
    
    // 오디오 합성용 Web Audio API 변수
    let audioCtx = null;
    let audioDest = null;

    window.onload = () => {
        canvasEl = document.getElementById('recorder-canvas');
        canvasCtx = canvasEl.getContext('2d');
        applyTemplate();
        loadSystemVoices();
    };

    function loadSystemVoices() {
        if (typeof speechSynthesis === 'undefined') return;

        function populateList() {
            systemVoices = speechSynthesis.getVoices();
            const voiceSelect = document.getElementById('voice-select');
            voiceSelect.innerHTML = '';

            const koVoices = systemVoices.filter(voice => voice.lang.includes('ko') || voice.lang.includes('KO'));

            if (koVoices.length === 0) {
                const opt = document.createElement('option');
                opt.value = "none";
                opt.textContent = "🔊 음성 읽기 기능 미지원";
                voiceSelect.appendChild(opt);
                return;
            }

            const silentOpt = document.createElement('option');
            silentOpt.value = "none";
            silentOpt.textContent = "🔇 목소리 끄기 (자막만 재생)";
            voiceSelect.appendChild(silentOpt);

            koVoices.sort((a, b) => {
                const aScore = a.name.includes('Natural') ? 3 : (a.name.includes('Google') ? 2 : 1);
                const bScore = b.name.includes('Natural') ? 3 : (b.name.includes('Google') ? 2 : 1);
                return bScore - aScore;
            });

            koVoices.forEach(voice => {
                const opt = document.createElement('option');
                opt.value = voice.name;
                let displayName = voice.name;
                if (voice.name.includes('Natural')) {
                    displayName = `[AI 고해상도] ${voice.name.replace('Microsoft', '').replace('Online', '')}`;
                } else if (voice.name.includes('Google')) {
                    displayName = `[표준음] Google 한국어`;
                } else {
                    displayName = `[기본음] ${voice.name}`;
                }
                opt.textContent = displayName;
                voiceSelect.appendChild(opt);
            });

            const defaultVoice = koVoices.find(v => v.name.includes('Natural')) || koVoices.find(v => v.name.includes('Google')) || koVoices[0];
            if (defaultVoice) {
                voiceSelect.value = defaultVoice.name;
            }
        }

        populateList();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateList;
        }
    }

    function toggleCameraSetup() {
        const toggle = document.getElementById('camera-toggle').value === 'true';
        document.getElementById('cam-placeholder').style.display = toggle ? 'none' : 'block';
    }

    function applyTemplate() {
        const type = document.getElementById('template-select').value;
        const container = document.getElementById('question-list');
        container.innerHTML = '';
        const list = templates[type] || [{ q: "", k: "" }];
        list.forEach(item => addQuestionField(item.q, item.k, item.q_tail));
    }

    function addQuestionField(question = "", keywords = "", tail = "") {
        const container = document.getElementById('question-list');
        const div = document.createElement('div');
        div.className = 'question-item';
        div.innerHTML = `
            <input type="text" placeholder="질문" value="${question}" style="flex:2;" class="q-val">
            <input type="text" placeholder="키워드(콤마구분)" value="${keywords}" style="flex:1;" class="k-val">
            <input type="hidden" class="tail-val" value="${tail}">
            <button class="btn btn-secondary" onclick="this.parentElement.remove()" style="padding:10px; min-height:auto; height:100%; width: 36px; min-height: 42px;">X</button>
        `;
        container.appendChild(div);
    }

    async function startCamera() {
        const constraints = {
            audio: true,
            video: { facingMode: "user", width: 640, height: 480 }
        };

        try {
            mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
            document.getElementById('webcam-view').srcObject = mediaStream;
            document.getElementById('cam-placeholder').classList.add('hidden');
        } catch (e) {
            console.warn("디바이스 권한 획득 실패:", e);
            alert("카메라와 마이크 권한을 승인해야 자막 합성 녹화가 원활히 작동합니다.");
        }
    }

    // 캔버스에 실시간 카메라 + 질문 자막 합성 루프 시작
    function startCanvasOverlayLoop() {
        const video = document.getElementById('webcam-view');
        
        function render() {
            if (!mediaStream) return;
            
            // 1. 카메라 화면 그리기 (좌우반전 적용)
            canvasCtx.save();
            canvasCtx.translate(canvasEl.width, 0);
            canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(video, 0, 0, canvasEl.width, canvasEl.height);
            canvasCtx.restore();

            // 2. 하단 자막바 레이아웃 그리기
            canvasCtx.fillStyle = "rgba(15, 23, 42, 0.8)"; // 어두운 슬레이트 투명 배경
            canvasCtx.fillRect(0, canvasEl.height - 90, canvasEl.width, 90);

            // 3. 자막 텍스트 쓰기
            canvasCtx.fillStyle = "#ffffff";
            canvasCtx.font = "bold 16px -apple-system, sans-serif";
            canvasCtx.textAlign = "center";
            canvasCtx.textBaseline = "middle";
            
            // 긴 질문 줄바꿈 처리
            wrapText(canvasCtx, currentQuestionText, canvasEl.width / 2, canvasEl.height - 45, 580, 24);

            renderLoop = requestAnimationFrame(render);
        }
        render();
    }

    // 자막 줄바꿈 헬퍼 함수
    function wrapText(context, text, x, y, maxWidth, lineHeight) {
        const words = text.split(' ');
        let line = '';
        let lines = [];

        for (let n = 0; n < words.length; n++) {
            let testLine = line + words[n] + ' ';
            let metrics = context.measureText(testLine);
            let testWidth = metrics.width;
            if (testWidth > maxWidth && n > 0) {
                lines.push(line);
                line = words[n] + ' ';
            } else {
                line = testLine;
            }
        }
        lines.push(line);

        // 자막이 1줄 혹은 2줄일 때 배치 조정
        let startY = y - ((lines.length - 1) * lineHeight) / 2;
        for (let i = 0; i < lines.length; i++) {
            context.fillText(lines[i], x, startY + (i * lineHeight));
        }
    }

    // 질문 전환 시 마이크 소리와 섞여 들어갈 비프음 발생기 (Web Audio API)
    function playChime() {
        if (!audioCtx) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioDest);
            
            osc.frequency.setValueAtTime(440, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1); 
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        } catch (e) {
            console.error("알림음 합성 실패", e);
        }
    }

    // 마스터 자막 비디오+오디오 믹싱 녹화 시작
    function startMasterRecording() {
        if (!mediaStream) return;
        masterChunks = [];
        
        // 1. 오디오 합성 노드 생성 (마이크 소리 연결)
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioDest = audioCtx.createMediaStreamDestination();
        const micSource = audioCtx.createMediaStreamSource(mediaStream);
        micSource.connect(audioDest);

        // 2. 자막 캔버스로부터 비디오 트랙 추출 (초당 30프레임)
        const canvasStream = canvasEl.captureStream(30);
        const videoTrack = canvasStream.getVideoTracks()[0];
        
        // 3. 믹싱된 오디오 트랙 추출
        const mixedAudioTrack = audioDest.stream.getAudioTracks()[0];

        // 4. 비디오 트랙과 오디오 트랙 병합하여 가상 스트림 완성
        const recordStream = new MediaStream([videoTrack, mixedAudioTrack]);

        let options = {};
        if (typeof MediaRecorder !== 'undefined') {
            if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) {
                options = { mimeType: 'video/webm;codecs=vp9' };
            } else if (MediaRecorder.isTypeSupported('video/webm')) {
                options = { mimeType: 'video/webm' };
            } else if (MediaRecorder.isTypeSupported('video/mp4')) {
                options = { mimeType: 'video/mp4' }; // 아이폰 사파리 호환
            }
        }

        try {
            masterRecorder = new MediaRecorder(recordStream, options);
            masterRecorder.ondataavailable = e => {
                if (e.data.size > 0) masterChunks.push(e.data);
            };
            masterRecorder.start();
            sessionStartTime = Date.now();
        } catch (err) {
            console.error("합성 녹화 엔진 실패:", err);
        }
    }

    async function startInterview() {
        const qElements = document.querySelectorAll('.q-val');
        const kElements = document.querySelectorAll('.k-val');
        const tailElements = document.querySelectorAll('.tail-val');
        
        interviewSession = [];
        qElements.forEach((el, i) => {
            if (el.value.trim()) {
                interviewSession.push({
                    q: el.value.trim(),
                    keywords: kElements[i].value ? kElements[i].value.split(',').map(x=>x.trim()) : [],
                    q_tail: tailElements[i].value || null
                });
            }
        });

        if (interviewSession.length === 0) {
            alert('질문을 추가해 주세요.');
            return;
        }

        await startCamera();
        
        // 실시간 자막 합성 루프 및 믹싱 녹음 기동
        startCanvasOverlayLoop();
        startMasterRecording();

        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('interview-screen').classList.remove('hidden');
        currentIdx = 0;
        isFollowUpStep = false;
        timelineMarks = [];
        loadStep();
    }

    function loadStep() {
        const currentData = interviewSession[currentIdx];
        let currentQuestion = "";

        if (isFollowUpStep) {
            currentQuestion = currentData.q_tail || generalFollowUps[Math.floor(Math.random() * generalFollowUps.length)];
            document.getElementById('step-badge').textContent = `꼬리 질문`;
            document.getElementById('step-badge').classList.add('badge-tail');
            document.getElementById('keyword-zone').classList.add('hidden');
        } else {
            currentQuestion = currentData.q;
            document.getElementById('step-badge').textContent = `질문 ${currentIdx + 1}`;
            document.getElementById('step-badge').classList.remove('badge-tail');
            
            const kwContainer = document.getElementById('keyword-tags-target');
            kwContainer.innerHTML = '';
            if (currentData.keywords.length > 0 && currentData.keywords[0] !== "") {
                document.getElementById('keyword-zone').classList.remove('hidden');
                currentData.keywords.forEach(kw => {
                    const tag = document.createElement('span');
                    tag.className = 'keyword-tag';
                    tag.textContent = kw;
                    tag.onclick = () => tag.classList.toggle('checked');
                    kwContainer.appendChild(tag);
                });
            } else {
                document.getElementById('keyword-zone').classList.add('hidden');
            }
        }

        // 실시간 캔버스 렌더러에 현재 질문 주입
        currentQuestionText = currentQuestion;

        // 질문 시작 알림 비프음을 녹화 트랙에 믹싱
        playChime();

        document.getElementById('question-display').textContent = currentQuestion;

        timelineMarks.push({
            timeOffset: Math.floor((Date.now() - sessionStartTime) / 1000),
            question: currentQuestion,
            type: isFollowUpStep ? '꼬리질문' : '본질문'
        });

        const selectedVoiceName = document.getElementById('voice-select').value;
        if (selectedVoiceName !== 'none') {
            speak(currentQuestion, selectedVoiceName);
        }

        timeLeft = parseInt(document.getElementById('time-limit').value) || 60;
        updateTimerDisplay();
        clearInterval(timer);
        timer = setInterval(countdown, 1000);
    }

    function countdown() {
        if (timeLeft <= 0) {
            clearInterval(timer);
            handleNext();
            return;
        }
        timeLeft--;
        updateTimerDisplay();
    }

    function updateTimerDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        const display = document.getElementById('timer-display');
        display.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        if (timeLeft <= 10) display.classList.add('warning');
        else display.classList.remove('warning');
    }

    function handleNext() {
        window.speechSynthesis.cancel();
        const currentData = interviewSession[currentIdx];
        const tailRatio = parseFloat(document.getElementById('tail-ratio').value);

        if (!isFollowUpStep && (currentData.q_tail || Math.random() < tailRatio)) {
            isFollowUpStep = true;
            setTimeout(loadStep, 300);
        } else {
            isFollowUpStep = false;
            currentIdx++;
            if (currentIdx < interviewSession.length) {
                setTimeout(loadStep, 300);
            } else {
                setTimeout(finishInterview, 300);
            }
        }
    }

    function finishInterview() {
        clearInterval(timer);
        window.speechSynthesis.cancel();
        cancelAnimationFrame(renderLoop); // 캔버스 루프 파괴

        document.getElementById('interview-screen').classList.add('hidden');
        document.getElementById('feedback-screen').classList.remove('hidden');

        if (masterRecorder && masterRecorder.state !== 'inactive') {
            masterRecorder.onstop = () => {
                const mimeType = masterRecorder.mimeType || 'video/webm';
                const videoBlob = new Blob(masterChunks, { type: mimeType });
                const videoUrl = URL.createObjectURL(videoBlob);
                
                const finalVideo = document.getElementById('final-video');
                finalVideo.src = videoUrl;
                
                const downloadLink = document.getElementById('download-link');
                downloadLink.href = videoUrl;
                
                const extension = mimeType.includes('mp4') ? 'mp4' : 'webm';
                downloadLink.download = `my_interview_report.${extension}`;

                document.getElementById('final-video-box').classList.remove('hidden');

                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                }
            };
            masterRecorder.stop();
        } else {
            document.getElementById('final-video-box').classList.add('hidden');
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
        }

        renderFeedbackReport();
    }

    function stopInterview() {
        if (confirm("면접을 종료할까요? 완전히 완료되어야 영상이 합성됩니다.")) {
            location.reload();
        }
    }

    function speak(text, voiceName) {
        window.speechSynthesis.cancel();
        const cleanText = text.replace(/^\d+[\.\s]*/, '');
        const utterance = new SpeechSynthesisUtterance(cleanText);
        
        const matchedVoice = systemVoices.find(v => v.name === voiceName);
        if (matchedVoice) {
            utterance.voice = matchedVoice;
        }
        
        utterance.lang = 'ko-KR';
        utterance.rate = 1.05;
        window.speechSynthesis.speak(utterance);
    }

    function renderFeedbackReport() {
        const target = document.getElementById('feedback-list');
        target.innerHTML = '';

        timelineMarks.forEach((mark, index) => {
            const card = document.createElement('div');
            card.className = 'feedback-item';
            
            const minutes = Math.floor(mark.timeOffset / 60);
            const seconds = mark.timeOffset % 60;
            const timeFormatted = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="badge ${mark.type === '꼬리질문' ? 'badge-tail' : ''}">${mark.type}</span>
                    <span style="font-size:11px; font-weight:700; color:var(--primary);">🕒 재생위치: ${timeFormatted}</span>
                </div>
                <h3 style="margin-top: 8px; font-size:13px; color:var(--text);">${index + 1}. ${mark.question}</h3>
                
                <div class="rating-group">
                    <div class="rating-field">
                        <span>전달력 (속도 및 톤)</span>
                        <div class="stars">
                            ${[1,2,3,4,5].map(num => `<span class="star" onclick="rateStar(this, ${num})">★</span>`).join('')}
                        </div>
                    </div>
                    <div class="rating-field">
                        <span>논리성 (구조화 및 완결성)</span>
                        <div class="stars">
                            ${[1,2,3,4,5].map(num => `<span class="star" onclick="rateStar(this, ${num})">★</span>`).join('')}
                        </div>
                    </div>
                </div>
                <textarea placeholder="피드백 메모 작성..." style="margin-top:8px; height:50px; font-size:11px;"></textarea>
            `;
            target.appendChild(card);
        });
    }

    function rateStar(element, score) {
        const stars = element.parentElement.children;
        for (let i = 0; i < stars.length; i++) {
            if (i < score) stars[i].classList.add('active');
            else stars[i].classList.remove('active');
        }
    }
</script>
