<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 면접 트레이너 PRO (영상 녹화 지원)</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --accent: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 550px;
        }

        .hidden { display: none !important; }

        /* 설정 화면 */
        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 20px;
            padding: 24px;
        }

        .setup-left, .setup-right {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        select, input[type="number"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background: var(--card);
            outline: none;
            -webkit-appearance: none;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 48px;
            text-decoration: none;
        }

        .btn:active { background: #1d4ed8; }
        .btn-secondary { background: #e2e8f0; color: var(--text); }
        .btn-accent { background: var(--success); }
        .btn-accent:active { background: #059669; }

        .question-item {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .question-list-container {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 8px;
        }

        /* 면접 진행 화면 */
        .interview-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            min-height: 500px;
        }

        .interview-left {
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid var(--border);
        }

        .interview-right {
            background: #0f172a;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
            min-height: 200px;
        }

        #webcam-view {
            width: 100%;
            max-width: 400px;
            height: 220px;
            background: #1e293b;
            border-radius: 12px;
            object-fit: cover;
            transform: rotateY(180deg);
        }

        .camera-placeholder {
            position: absolute;
            color: var(--muted);
            font-size: 13px;
        }

        .timer-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .timer-val {
            font-size: 28px;
            font-weight: 800;
        }

        .timer-val.warning { color: var(--accent); }

        .badge {
            background: var(--primary-light);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-tail { background: #fff7ed; color: #ea580c; }

        .question-display {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 16px;
            min-height: 80px;
        }

        .keyword-zone { margin-top: 12px; }
        .keyword-title { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
        .keyword-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        
        .keyword-tag {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        .keyword-tag.checked { background: var(--success); color: white; border-color: var(--success); }

        /* 결과 화면 */
        .feedback-container {
            padding: 24px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .feedback-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .rating-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 12px 0;
        }

        .rating-field {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .stars { display: flex; gap: 4px; }
        .star { cursor: pointer; font-size: 18px; color: #cbd5e1; }
        .star.active { color: #f59e0b; }

        .video-box {
            text-align: center;
            background: #0f172a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }

        #final-video {
            width: 100%;
            max-width: 480px;
            border-radius: 8px;
            background: #1e293b;
        }

        @media (max-width: 768px) {
            body { padding: 4px; }
            .app-container { border-radius: 12px; min-height: auto; }
            .setup-grid { grid-template-columns: 1fr; padding: 16px; gap: 16px; }
            .interview-grid { grid-template-columns: 1fr; }
            .interview-left { order: 2; padding: 16px; border-right: none; border-top: 1px solid var(--border); }
            .interview-right { order: 1; padding: 12px; min-height: 180px; }
            #webcam-view { height: 160px; }
            .question-display { font-size: 16px; min-height: 60px; }
            .timer-val { font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- 세팅 화면 -->
    <div id="setup-screen" class="setup-grid">
        <div class="setup-left">
            <div>
                <h1 style="font-size: 18px; font-weight:800; margin-bottom:2px;">스마트 면접 트레이너 PRO</h1>
                <p style="color: var(--muted); font-size: 12px;">전체 모의면접 영상 통합 녹화 기능 제공.</p>
            </div>
            
            <div class="card">
                <div class="section-title">⚙️ 옵션 설정</div>
                <div class="form-group">
                    <label>답변 시간 (초)</label>
                    <input type="number" id="time-limit" value="60" min="10">
                </div>
                
                <div class="form-group">
                    <label>면접관 목소리 선택</label>
                    <select id="voice-select">
                        <option value="none">불러오는 중...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>꼬리 질문 확률</label>
                    <select id="tail-ratio">
                        <option value="0.5">50% 확률</option>
                        <option value="1">100% 출제</option>
                        <option value="0">출제 안 함</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>카메라 및 전체 녹화 설정</label>
                    <select id="camera-toggle" onchange="toggleCameraSetup()">
                        <option value="true">전면 카메라 및 영상 녹화 활성화</option>
                        <option value="false">비활성화 (음성만 진행)</option>
                    </select>
                </div>
            </div>
            <button class="btn" onclick="startInterview()">면접 시작하기 →</button>
        </div>

        <div class="setup-right">
            <div class="card">
                <div class="section-title">📂 질문 템플릿</div>
                <select id="template-select" onchange="applyTemplate()" style="margin-bottom: 12px;">
                    <option value="custom">직접 입력</option>
                    <option value="hr">인성/HR 질문</option>
                    <option value="tech">IT 개발자 질문</option>
                    <option value="marketing">마케팅/기획 질문</option>
                </select>

                <div class="section-title" style="margin-top: 8px;">📝 질문 / 핵심 키워드</div>
                <div class="question-list-container" id="question-list"></div>
                <button class="btn btn-secondary" style="width:100%;" onclick="addQuestionField()">+ 질문 추가</button>
            </div>
        </div>
    </div>

    <!-- 인터뷰 진행 화면 -->
    <div id="interview-screen" class="hidden">
        <div class="interview-grid">
            <div class="interview-right">
                <span class="camera-placeholder" id="cam-placeholder">카메라 비활성화</span>
                <video id="webcam-view" autoplay muted playsinline webkit-playsinline></video>
                <div style="margin-top:8px; font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:4px;">
                    <span style="display:inline-block; width:6px; height:6px; background:var(--accent); border-radius:50%;"></span>
                    전체 비디오/오디오 연속 녹화 중
                </div>
            </div>
            
            <div class="interview-left">
                <div>
                    <div class="timer-container">
                        <span class="badge" id="step-badge">질문 1</span>
                        <div class="timer-val" id="timer-display">00:00</div>
                    </div>
                    <div class="question-display" id="question-display">불러오는 중...</div>
                    
                    <div class="keyword-zone" id="keyword-zone">
                        <div class="keyword-title">키워드 체크</div>
                        <div class="keyword-tags" id="keyword-tags-target"></div>
                    </div>
                </div>
                <div style="display: flex; gap:10px; margin-top:16px;">
                    <button class="btn btn-secondary" style="flex: 1;" onclick="stopInterview()">중단</button>
                    <button class="btn" style="flex: 1.5;" id="next-btn" onclick="handleNext()">다음 →</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 결과 화면 (전체 녹화물 포함) -->
    <div id="feedback-screen" class="feedback-container hidden">
        <h1 style="font-size:18px; margin-bottom:4px;">모의면접 최종 결과 리포트</h1>
        <p style="color:var(--muted); margin-bottom:20px; font-size:12px;">아래 비디오에서 전체 답변 중 시선 처리와 말투를 확인하고 영상을 저장하세요.</p>
        
        <!-- 전체 영상 재생 상자 -->
        <div class="video-box" id="final-video-box">
            <h2 style="color: white; font-size: 14px; margin-bottom: 12px;">📹 전체 녹화 모니터링 (목소리 포함)</h2>
            <video id="final-video" controls playsinline></video>
            <div style="margin-top: 14px;">
                <a id="download-link" class="btn btn-accent" href="#" download="my_interview_practice.mp4">📥 면접 녹화 영상 파일 받기</a>
            </div>
        </div>

        <div id="feedback-list"></div>

        <div style="text-align: right; margin-top:16px;">
            <button class="btn" onclick="location.reload()">새 면접 시작하기</button>
        </div>
    </div>

</div>

<script>
    const templates = {
        hr: [
            { q: "간단한 자기소개와 지원 동기를 말씀해 주세요.", k: "자기소개,동기,강점" },
            { q: "상사나 동료와 갈등이 생겼을 때 어떻게 해결하겠습니까?", q_tail: "과거에 갈등을 합리적으로 해결했던 실제 경험이 있습니까?", k: "경청,조율" }
        ],
        tech: [
            { q: "본인이 경험한 주력 기술 스택과 그것을 선정한 이유를 말해 주세요.", k: "기술명,이유,장점" },
            { q: "프로젝트 중 기술적 난관과 이를 해결했던 과정을 설명해 주세요.", q_tail: "그 해결 방법의 아쉬운 점이나 대안책은 없었습니까?", k: "문제,해결책" }
        ],
        marketing: [
            { q: "본인이 기획한 프로젝트 중 가장 성공적이었던 일은 무엇인가요?", k: "목표,성과,기여도" },
            { q: "제한된 리소스로 효율을 극대화해야 한다면 어떤 전략을 취하겠습니까?", k: "우선순위,데이터" }
        ]
    };

    const generalFollowUps = [
        "그 당시의 선택이 최선이라고 판단한 이유는 무엇이었나요?",
        "이후 동일한 상황을 맞닥뜨린다면 어떻게 다르게 행동하겠습니까?"
    ];

    let interviewSession = [];
    let currentIdx = 0;
    let timer = null;
    let timeLeft = 0;
    let mediaStream = null;
    
    // 비디오/오디오 전체 연속 녹화를 위한 전역 변수
    let masterRecorder = null;
    let masterChunks = [];
    
    let isFollowUpStep = false;
    let systemVoices = [];
    
    // 단순 가이드 마킹용 배열
    let timelineMarks = [];
    let sessionStartTime = 0;

    window.onload = () => {
        applyTemplate();
        loadSystemVoices();
    };

    function loadSystemVoices() {
        if (typeof speechSynthesis === 'undefined') return;

        function populateList() {
            systemVoices = speechSynthesis.getVoices();
            const voiceSelect = document.getElementById('voice-select');
            voiceSelect.innerHTML = '';

            const koVoices = systemVoices.filter(voice => voice.lang.includes('ko') || voice.lang.includes('KO'));

            if (koVoices.length === 0) {
                const opt = document.createElement('option');
                opt.value = "none";
                opt.textContent = "🔊 음성 읽기 기능 미지원 기기";
                voiceSelect.appendChild(opt);
                return;
            }

            const silentOpt = document.createElement('option');
            silentOpt.value = "none";
            silentOpt.textContent = "🔇 목소리 끄기 (자막만 보기)";
            voiceSelect.appendChild(silentOpt);

            koVoices.sort((a, b) => {
                const aScore = a.name.includes('Natural') ? 3 : (a.name.includes('Google') ? 2 : 1);
                const bScore = b.name.includes('Natural') ? 3 : (b.name.includes('Google') ? 2 : 1);
                return bScore - aScore;
            });

            koVoices.forEach(voice => {
                const opt = document.createElement('option');
                opt.value = voice.name;
                
                let displayName = voice.name;
                if (voice.name.includes('Natural')) {
                    displayName = `[AI 고해상도] ${voice.name.replace('Microsoft', '').replace('Online', '')}`;
                } else if (voice.name.includes('Google')) {
                    displayName = `[부드러운 표준음] Google 한국어`;
                } else {
                    displayName = `[기본 음성] ${voice.name}`;
                }
                opt.textContent = displayName;
                voiceSelect.appendChild(opt);
            });

            const defaultVoice = koVoices.find(v => v.name.includes('Natural')) || koVoices.find(v => v.name.includes('Google')) || koVoices[0];
            if (defaultVoice) {
                voiceSelect.value = defaultVoice.name;
            }
        }

        populateList();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateList;
        }
    }

    function toggleCameraSetup() {
        const toggle = document.getElementById('camera-toggle').value === 'true';
        document.getElementById('cam-placeholder').style.display = toggle ? 'none' : 'block';
    }

    function applyTemplate() {
        const type = document.getElementById('template-select').value;
        const container = document.getElementById('question-list');
        container.innerHTML = '';
        const list = templates[type] || [{ q: "", k: "" }];
        list.forEach(item => addQuestionField(item.q, item.k, item.q_tail));
    }

    function addQuestionField(question = "", keywords = "", tail = "") {
        const container = document.getElementById('question-list');
        const div = document.createElement('div');
        div.className = 'question-item';
        div.innerHTML = `
            <input type="text" placeholder="질문" value="${question}" style="flex:2;" class="q-val">
            <input type="text" placeholder="키워드(콤마구분)" value="${keywords}" style="flex:1;" class="k-val">
            <input type="hidden" class="tail-val" value="${tail}">
            <button class="btn btn-secondary" onclick="this.parentElement.remove()" style="padding:10px; min-height:auto; height:100%;">X</button>
        `;
        container.appendChild(div);
    }

    async function startCamera() {
        const cameraOn = document.getElementById('camera-toggle').value === 'true';
        const constraints = {
            audio: true,
            video: cameraOn ? { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } } : false
        };

        try {
            mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
            if (cameraOn) {
                document.getElementById('webcam-view').srcObject = mediaStream;
                document.getElementById('cam-placeholder').classList.add('hidden');
            }
        } catch (e) {
            console.warn("전체 장치 권한 확보 실패:", e);
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (err) {
                alert("면접 분석을 진행하기 위해 카메라 또는 마이크 권한을 승인해야 합니다.");
            }
        }
    }

    // 마스터 연속 녹화 제어 (전체 세션을 원테이크로 처리)
    function startMasterRecording() {
        if (!mediaStream) return;
        masterChunks = [];
        
        let options = {};
        // 브라우저 최적화 오디오/비디오 규격 획득
        if (typeof MediaRecorder !== 'undefined') {
            if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) {
                options = { mimeType: 'video/webm;codecs=vp9' };
            } else if (MediaRecorder.isTypeSupported('video/webm')) {
                options = { mimeType: 'video/webm' };
            } else if (MediaRecorder.isTypeSupported('video/mp4')) {
                options = { mimeType: 'video/mp4' }; // iOS Safari 전용 대응
            }
        }

        try {
            masterRecorder = new MediaRecorder(mediaStream, options);
            masterRecorder.ondataavailable = e => {
                if (e.data.size > 0) masterChunks.push(e.data);
            };
            masterRecorder.start();
            sessionStartTime = Date.now();
        } catch (err) {
            console.error("마스터 녹화기 구동 실패:", err);
        }
    }

    async function startInterview() {
        const qElements = document.querySelectorAll('.q-val');
        const kElements = document.querySelectorAll('.k-val');
        const tailElements = document.querySelectorAll('.tail-val');
        
        interviewSession = [];
        qElements.forEach((el, i) => {
            if (el.value.trim()) {
                interviewSession.push({
                    q: el.value.trim(),
                    keywords: kElements[i].value ? kElements[i].value.split(',').map(x=>x.trim()) : [],
                    q_tail: tailElements[i].value || null
                });
            }
        });

        if (interviewSession.length === 0) {
            alert('질문을 추가해 주세요.');
            return;
        }

        await startCamera();
        
        // 원테이크 전체 녹화 시작
        startMasterRecording();

        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('interview-screen').classList.remove('hidden');
        currentIdx = 0;
        isFollowUpStep = false;
        timelineMarks = [];
        loadStep();
    }

    function loadStep() {
        const currentData = interviewSession[currentIdx];
        let currentQuestion = "";

        if (isFollowUpStep) {
            currentQuestion = currentData.q_tail || generalFollowUps[Math.floor(Math.random() * generalFollowUps.length)];
            document.getElementById('step-badge').textContent = `꼬리 질문`;
            document.getElementById('step-badge').classList.add('badge-tail');
            document.getElementById('keyword-zone').classList.add('hidden');
        } else {
            currentQuestion = currentData.q;
            document.getElementById('step-badge').textContent = `질문 ${currentIdx + 1}`;
            document.getElementById('step-badge').classList.remove('badge-tail');
            
            const kwContainer = document.getElementById('keyword-tags-target');
            kwContainer.innerHTML = '';
            if (currentData.keywords.length > 0 && currentData.keywords[0] !== "") {
                document.getElementById('keyword-zone').classList.remove('hidden');
                currentData.keywords.forEach(kw => {
                    const tag = document.createElement('span');
                    tag.className = 'keyword-tag';
                    tag.textContent = kw;
                    tag.onclick = () => tag.classList.toggle('checked');
                    kwContainer.appendChild(tag);
                });
            } else {
                document.getElementById('keyword-zone').classList.add('hidden');
            }
        }

        document.getElementById('question-display').textContent = currentQuestion;

        // 타임라인 마크 기록 (피드백 결과 매칭용)
        timelineMarks.push({
            timeOffset: Math.floor((Date.now() - sessionStartTime) / 1000),
            question: currentQuestion,
            type: isFollowUpStep ? '꼬리질문' : '본질문'
        });

        const selectedVoiceName = document.getElementById('voice-select').value;
        if (selectedVoiceName !== 'none') {
            speak(currentQuestion, selectedVoiceName);
        }

        timeLeft = parseInt(document.getElementById('time-limit').value) || 60;
        updateTimerDisplay();
        clearInterval(timer);
        timer = setInterval(countdown, 1000);
    }

    function countdown() {
        if (timeLeft <= 0) {
            clearInterval(timer);
            handleNext();
            return;
        }
        timeLeft--;
        updateTimerDisplay();
    }

    function updateTimerDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        const display = document.getElementById('timer-display');
        display.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        if (timeLeft <= 10) display.classList.add('warning');
        else display.classList.remove('warning');
    }

    function handleNext() {
        window.speechSynthesis.cancel();
        const currentData = interviewSession[currentIdx];
        const tailRatio = parseFloat(document.getElementById('tail-ratio').value);

        if (!isFollowUpStep && (currentData.q_tail || Math.random() < tailRatio)) {
            isFollowUpStep = true;
            setTimeout(loadStep, 300);
        } else {
            isFollowUpStep = false;
            currentIdx++;
            if (currentIdx < interviewSession.length) {
                setTimeout(loadStep, 300);
            } else {
                setTimeout(finishInterview, 300);
            }
        }
    }

    function finishInterview() {
        clearInterval(timer);
        window.speechSynthesis.cancel();

        document.getElementById('interview-screen').classList.add('hidden');
        document.getElementById('feedback-screen').classList.remove('hidden');

        // 마스터 리코더 정지 및 파일화 처리
        if (masterRecorder && masterRecorder.state !== 'inactive') {
            masterRecorder.onstop = () => {
                const mimeType = masterRecorder.mimeType || 'video/webm';
                const videoBlob = new Blob(masterChunks, { type: mimeType });
                const videoUrl = URL.createObjectURL(videoBlob);
                
                // 플레이어 셋업 및 다운로드 버튼 링크 연동
                const finalVideo = document.getElementById('final-video');
                finalVideo.src = videoUrl;
                
                const downloadLink = document.getElementById('download-link');
                downloadLink.href = videoUrl;
                
                // 기기 확장자 맞춤 자동 파일 지정 (.mp4 혹은 .webm)
                const extension = mimeType.includes('mp4') ? 'mp4' : 'webm';
                downloadLink.download = `my_interview_practice.${extension}`;

                // 비디오 박스 노출
                document.getElementById('final-video-box').classList.remove('hidden');

                // 카메라 스트림 일체 종료
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                }
            };
            masterRecorder.stop();
        } else {
            // 녹화가 꺼져있을 때 처리
            document.getElementById('final-video-box').classList.add('hidden');
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
        }

        renderFeedbackReport();
    }

    function stopInterview() {
        if (confirm("면접을 종료할까요? 녹화본은 끝까지 수료해야 저장됩니다.")) {
            location.reload();
        }
    }

    function speak(text, voiceName) {
        window.speechSynthesis.cancel();
        const cleanText = text.replace(/^\d+[\.\s]*/, '');
        const utterance = new SpeechSynthesisUtterance(cleanText);
        
        const matchedVoice = systemVoices.find(v => v.name === voiceName);
        if (matchedVoice) {
            utterance.voice = matchedVoice;
        }
        
        utterance.lang = 'ko-KR';
        utterance.rate = 1.05;
        window.speechSynthesis.speak(utterance);
    }

    // 결과지 타임라인 가이드라인 렌더링
    function renderFeedbackReport() {
        const target = document.getElementById('feedback-list');
        target.innerHTML = '';

        timelineMarks.forEach((mark, index) => {
            const card = document.createElement('div');
            card.className = 'feedback-item';
            
            // 시, 분, 초 형식 가공
            const minutes = Math.floor(mark.timeOffset / 60);
            const seconds = mark.timeOffset % 60;
            const timeFormatted = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="badge ${mark.type === '꼬리질문' ? 'badge-tail' : ''}">${mark.type}</span>
                    <span style="font-size:12px; font-weight:700; color:var(--primary);">🕒 영상 타임라인: 약 ${timeFormatted} 위치</span>
                </div>
                <h3 style="margin-top: 8px; font-size:14px; color:var(--text);">${index + 1}. ${mark.question}</h3>
                
                <div class="rating-group">
                    <div class="rating-field">
                        <span>전달력 (목소리 톤/속도/발음)</span>
                        <div class="stars">
                            ${[1,2,3,4,5].map(num => `<span class="star" onclick="rateStar(this, ${num})">★</span>`).join('')}
                        </div>
                    </div>
                    <div class="rating-field">
                        <span>논리성 (답변 구조화 및 완성도)</span>
                        <div class="stars">
                            ${[1,2,3,4,5].map(num => `<span class="star" onclick="rateStar(this, ${num})">★</span>`).join('')}
                        </div>
                    </div>
                    <div class="rating-field">
                        <span>비언어적 요소 (시선 및 제스처)</span>
                        <div class="stars">
                            ${[1,2,3,4,5].map(num => `<span class="star" onclick="rateStar(this, ${num})">★</span>`).join('')}
                        </div>
                    </div>
                </div>
                <textarea placeholder="해당 구간 답변 개선 포인트 메모..." style="margin-top:8px; height:60px; font-size:12px;"></textarea>
            `;
            target.appendChild(card);
        });
    }

    function rateStar(element, score) {
        const stars = element.parentElement.children;
        for (let i = 0; i < stars.length; i++) {
            if (i < score) stars[i].classList.add('active');
            else stars[i].classList.remove('active');
        }
    }
</script>
</body>
</html>
